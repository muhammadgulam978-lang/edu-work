{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISIHn6L6pWv9U5E2AK4xAe6A9tOH8WkGpzlF5gVRuG8nvJnYJgPoE" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'login/css/login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>
    <div class="container-fluid">
        <div class="row main-content bg-black text-center">
            <div class="col-md-4 text-center company__info">
                <span class="company__logo">
                    <h2><span class="fa fa-android"></span></h2>
                </span>
                <h4 class="company_title">LMS (Learning Management System)</h4>
            </div>
            <div class="col-md-8 col-xs-12 col-sm-12 login_form">
                <div class="container-fluid" ;>

                    <form id="loginForm" method="POST" action="{% url 'login' %}" autocomplete="off">
                        <input type="text" name="fakeusernameremembered" style="display:none">
                        <input type="password" name="fakepasswordremembered" style="display:none">
                        {% csrf_token %}
                        <div class="row">
                            <h2>Log In</h2>
                        </div>
                        <div class="row">
                            <input type="text" name="username" id="username" class="form__input" placeholder="Username" autocomplete="off" required>
                        </div>
                        <div class="row">
                            <div class="password-container">
                                <input type="password" name="password" id="password" class="form__input" placeholder="Password" autocomplete="new-password" required>
                                <i id="togglePassword" class="fas fa-eye toggle-password"></i>
                            </div>
                        </div>
                        <div class="row">
                            <p><a href="{% url 'password_reset' %}">Forgot Password?</a></p>
                        </div>
                        <div class="row">
                            <input type="checkbox" name="remember_me" id="remember_me">
                            <label for="remember_me">Remember Me!</label>
                        </div>
                        <div class="row">
                            <input type="submit" value="Login" class="btn">
                        </div>
                    </form>

                    <div class="row">
                        <p>Don't have an account? Contact Admin</p>
                    </div>
                    <div id="errorMsg" style="color: red; margin-top: 10px;"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'login/js/login.js' %}"></script>
</body>
</html>
