{% extends "admin_panel/bases.html" %}
{% load static %}
{% block title %}User List{% endblock %}
{% block head %}
  <!-- Custom Stylesheet -->
{% endblock %}

{% block content %}
<div class="col-12">
  <div class="card" style="background: #f8f9fa; margin-left:20px; margin-right:20px;">
    <div class="card-header">
      <h4 class="card-title">All Users</h4>
      <!-- You can add a button here if needed -->
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table
          id="userTable"
          class="display table-responsive-lg dataTable no-footer"
          style="width: 100%;"
        >
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody>
            {% for user in users_with_roles %}
              <tr>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.role }}</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Required vendors -->
<script src="{% static 'admin_panel/vendor/global/global.min.js' %}"></script>
<script src="{% static 'admin_panel/vendor/bootstrap-select/dist/js/bootstrap-select.min.js' %}"></script>

<!-- Datatable -->
<script src="{% static 'admin_panel/vendor/datatables/js/jquery.dataTables.min.js' %}"></script>
<script src="{% static 'admin_panel/js/plugins-init/datatables.init.js' %}"></script>
{% endblock %}
