{% extends 'admin_panel/bases.html' %}
{% load static %}

{% block title %}
  Assign Class Teacher
{% endblock %}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
{% endblock %}

{% block content %}

<div class="card" style="margin: 20px; background-color: #ffffff;">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4 class="card-title">Assign Class Teacher</h4>
    <a href="{% url 'class_teacher_list' %}" class="btn btn-primary">
      <span class="me-2"><i class="fa fa-arrow-left"></i></span>Back to List
    </a>
  </div>

  <div class="card-body">
    <form method="post">
      {% csrf_token %}

      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <!-- Academic Year -->
      <div class="mb-3">
        <label class="form-label">Academic Year:</label>
        <select name="academic_year" id="id_academic_year" class="form-select">
          <option value="">-- Select Academic Year --</option>
          {% for year in academic_years %}
            <option value="{{ year.id }}">{{ year.year }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Class -->
      <div class="mb-3">
        <label class="form-label">Class:</label>
        <select name="class_fk" id="id_class" class="form-select">
          <option value="">-- Select Class --</option>
          {% for cls in classes %}
            <option value="{{ cls.id }}">{{ cls.class_name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Section -->
      <div class="mb-3">
        <label class="form-label">Section:</label>
        <select name="section" id="id_section" class="form-select">
          <option value="">-- Select Section --</option>
        </select>
      </div>

      <!-- Teacher -->
      <div class="mb-3">
        <label class="form-label">Teacher:</label>
        <select name="teacher" id="id_teacher" class="form-select">
          <option value="">-- Select Teacher --</option>
        </select>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-success">Save</button>
    </form>
  </div>
</div>

<!-- Scripts should go outside the form -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  // On Class change → load sections
  $("#id_class").change(function () {
    const classId = $(this).val();

    if (!classId) {
      $("#id_section").html('<option value="">-- Select Section --</option>');
      $("#id_teacher").html('<option value="">-- Select Teacher --</option>');
      return;
    }

    $.get("{% url 'ajax_load_sections' %}", { class_id: classId }, function (data) {
      let sectionOptions = '<option value="">-- Select Section --</option>';
      data.sections.forEach(sec => {
        sectionOptions += `<option value="${sec.id}">${sec.section_name}</option>`;
      });
      $("#id_section").html(sectionOptions);
      $("#id_teacher").html('<option value="">-- Select Teacher --</option>'); // reset teacher
    });
  });

  // On Section change → load teachers
  $("#id_section").change(function () {
    const classId = $("#id_class").val();
    const sectionId = $(this).val();

    if (!classId || !sectionId) {
      $("#id_teacher").html('<option value="">-- Select Teacher --</option>');
      return;
    }

    $.get("{% url 'ajax_load_teachers_by_class' %}", {
      class_id: classId,
      section_id: sectionId
    }, function (data) {
      let teacherOptions = '<option value="">-- Select Teacher --</option>';
      data.teachers.forEach(t => {
        teacherOptions += `<option value="${t.id}">${t.name}</option>`;
      });
      $("#id_teacher").html(teacherOptions);
    });
  });
</script>

{% endblock %}
