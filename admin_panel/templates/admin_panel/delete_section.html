{% extends 'admin_panel/bases.html' %}
{% load static %}

{% block title %}Delete Section{% endblock %}

{% block content %}
<div class="card" style="background: #f8f9fa; margin-left: 20px; margin-right: 20px;">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="card-title mb-0">Delete Section</h4>
        <a href="{% url 'section_list' %}" class="btn btn-primary">
            <i class="fa fa-arrow-left me-2"></i>Back to List
        </a>
    </div>

    <div class="card-body">
        <p>Are you sure you want to delete section <strong>"{{ section }}"</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-danger">
                    <i class="fa fa-trash me-2"></i>Yes, Delete
                </button>
                <a href="{% url 'section_list' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
