{% extends "admin_panel/bases.html" %}
{% load static %}

{% block title %}Create Period{% endblock %}

{% block content %}
<div class="card" style="margin-left:20px; margin-right:20px; background-color: #ffffff">
  <div class="card-header">
    <h4 class="card-title">Create New Period</h4>
    
    <div class="mt-3">
      <a href="{% url 'period_list' %}" class="btn btn-secondary btn-sm">Back to List</a>
    </div>
  </div>

  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="text-center mt-3">
        <button type="submit" class="btn btn-primary" style="width: 150px;">Save</button>
      </div>
    </form>

  </div>
</div>
{% endblock %}
