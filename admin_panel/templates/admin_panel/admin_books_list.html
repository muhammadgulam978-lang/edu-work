
{% block content %}
<h2>All Books (Admin)</h2>
<a href="{% url 'admin_book_upload' %}" class="btn btn-primary">Upload Book</a>
<ul>
  {% for b in books %}
    <li><a href="{% url 'admin_book_detail' b.id %}">{{ b.title }}</a> - {{ b.class_for }} - {{ b.subject }}</li>
  {% empty %}
    <li>No books</li>
  {% endfor %}
</ul>
{% endblock %}
