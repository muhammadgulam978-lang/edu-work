{% extends 'admin_panel/bases.html' %}
{% load static %}

{% block title %}Add Class Group{% endblock %}

{% block head %}
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="card" style="margin-left:20px; margin-right:20px; background-color: #ffffff">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4 class="card-title">Add Class Group</h4>
    <a href="{% url 'class_group_list' %}" class="btn btn-primary">← Back to List</a>
  </div>

  <div class="card-body">
    <form method="post">
      {% csrf_token %}

      <div class="form-group mb-4">
        <label for="group_name" class="form-label">Group Name</label>
        <input type="text" id="group_name" name="group_name" required class="form-control">
      </div>
        <div class="col-lg-12 ms-auto text-center mt-4">
      <button type="submit" class="btn btn-primary mt-3">Add Group</button>
        </div>
    </form>
  </div>
</div>
{% endblock %}
