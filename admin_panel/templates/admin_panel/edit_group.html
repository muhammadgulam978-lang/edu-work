{% extends 'admin_panel/bases.html' %}
{% load static %}

{% block title %}Edit Class Group{% endblock %}

{% block head %}
<link rel="stylesheet" href="{% static 'admin_panel/css/registration.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="card" style="margin-left: 20px; margin-right: 20px; background-color: #ffffff;">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="card-title">Edit Class Group</h4>
        <a href="{% url 'class_group_list' %}" class="btn btn-primary me-2">
  <span class="me-2"><i class="fa fa-arrow-left"></i></span>Back to List
</a>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="group_name" class="form-label fw-bold">Group Name</label>
                <input type="text" id="group_name" name="group_name" value="{{ group.group_name }}" required class="form-control">
            </div>
            <div class="col-lg-12 ms-auto text-center mt-4">
            <button type="submit" class="btn btn-primary mt-3 text-center">Update Group</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
