{% extends "admin_panel/bases.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'admin_panel/css/hr_admin.css' %}?v=hr-admin-2">
{% endblock %}

{% block content %}
<div class="hr-page">
    <div class="hr-hero">
        <div class="hr-title-wrap">
            <span class="hr-icon blue"><i class="fas fa-id-card"></i></span>
            <div>
                <p class="hr-kicker">Organization</p>
                <h2>Create Designation</h2>
                <p class="hr-subtitle">Create a new designation under a department.</p>
            </div>
        </div>
    </div>

    <div class="hr-panel">
        <div class="hr-panel-header">
            <h4>Designation Details</h4>
        </div>
        <div class="hr-panel-body">
            <form method="post">
                {% csrf_token %}

                <div class="hr-form-grid">
                    <div class="hr-field">
                        <label class="form-label">Department</label>
                        <select name="department" class="form-select" required>
                            <option value="">Select Department</option>
                            {% for dept in departments %}
                            <option value="{{ dept.id }}">{{ dept.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="hr-field">
                        <label class="form-label">Designation Title</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                </div>

                <div class="hr-form-actions">
                    <a href="{% url 'designation_list' %}" class="btn btn-secondary">Cancel</a>
                    <button class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
