{% extends 'admin_panel/bases.html' %}
{% load static %}

{% block title %}Add Section{% endblock %}

{% block content %}
<div class="card" style="background: #f8f9fa; margin-left: 20px; margin-right: 20px;">
    <div class="card-header">
        <h4 class="card-title">Add New Section</h4>
        <a href="{% url 'section_list' %}" class="btn btn-primary me-2">
            <span class="me-2"><i class="fa fa-arrow-left"></i></span>Back to Section List
        </a>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <!-- Left Column -->
                <div class="col-xl-6">

                    <!-- Academic Year -->
                    <div class="mb-3 row">
                        <label class="col-lg-4 col-form-label">Academic Year</label>
                        <div class="col-lg-6">
                            {{ form.academic_year }}
                        </div>
                    </div>

                    <!-- Section Name -->
                    <div class="mb-3 row">
                        <label class="col-lg-4 col-form-label">Section Name</label>
                        <div class="col-lg-6">
                            {{ form.section_name }}
                        </div>
                    </div>

                </div>

                <!-- Right Column -->
                <div class="col-xl-6">

                    <!-- Class -->
                    <div class="mb-3 row">
                        <label class="col-lg-4 col-form-label">Class</label>
                        <div class="col-lg-6">
                            {{ form.class_fk }}
                        </div>
                    </div>

                    <!-- Capacity -->
                    <div class="mb-3 row">
                        <label class="col-lg-4 col-form-label">Capacity</label>
                        <div class="col-lg-6">
                            {{ form.capacity }}
                        </div>
                    </div>

                </div>

                <!-- Submit Button -->
                <div class="col-lg-12 ms-auto text-center mt-4">
                    <button type="submit" class="btn btn-primary">Create Section</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
