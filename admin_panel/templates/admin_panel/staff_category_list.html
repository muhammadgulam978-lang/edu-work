{% extends 'admin_panel/bases.html' %}
{% block content %}
<div class="card" style="margin: 20px;">
  <div class="card-header d-flex justify-content-between">
    <h4>Staff Categories</h4>
    <a href="{% url 'staff_category_create' %}" class="btn btn-primary btn-sm">+ Add Category</a>
  </div>
  <div class="card-body">
    <table class="table table-hover">
      <thead class="table-light">
        <tr>
          <th>Name</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        {% for cat in categories %}
        <tr>
          <td>{{ cat.name }}</td>
          <td>{{ cat.description }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="2" class="text-center">No categories found.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
