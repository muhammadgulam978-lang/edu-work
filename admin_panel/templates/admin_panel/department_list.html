{% extends "admin_panel/bases.html" %}
{% block content %}

<div class="container-fluid">
    <div class="row mb-3">
        <div class="col-md-6">
            <h4>Departments</h4>
        </div>
        <div class="col-md-6 text-end">
            <a href="{% url 'department_create' %}" class="btn btn-primary">
                + Add Department
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dept in departments %}
                    <tr>
                        <td>{{ dept.name }}</td>
                        <td>{{ dept.description|default:"-" }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center">No Departments Found</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
