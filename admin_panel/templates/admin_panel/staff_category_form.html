{% extends 'admin_panel/bases.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'admin_panel/css/hr_admin.css' %}?v=hr-admin-2">
{% endblock %}

{% block content %}
<div class="hr-page">
  <div class="hr-hero">
    <div class="hr-title-wrap">
      <span class="hr-icon purple"><i class="fas fa-user-tag"></i></span>
      <div>
        <p class="hr-kicker">HR Setup</p>
        <h2>Create Staff Category</h2>
        <p class="hr-subtitle">Create a staff grouping used while adding employees.</p>
      </div>
    </div>
  </div>

  <div class="hr-panel">
    <div class="hr-panel-header">
      <h4>Category Details</h4>
    </div>
    <div class="hr-panel-body">
      <form method="post">
        {% csrf_token %}
        <div class="hr-field">
          <label for="{{ form.name.id_for_label }}">Category Name</label>
          {{ form.name }}
        </div>
        <div class="hr-field">
          <label for="{{ form.description.id_for_label }}">Description</label>
          {{ form.description }}
        </div>
        <div class="hr-form-actions">
          <a href="{% url 'staff_category_list' %}" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
