{% extends 'admin_panel/bases.html' %}
{% block content %}
<div class="card" style="margin: 20px;">
  <div class="card-header"><h4>Create Staff Category</h4></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'staff_category_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
