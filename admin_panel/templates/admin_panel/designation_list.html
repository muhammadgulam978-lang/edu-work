{% extends "admin_panel/bases.html" %}
{% block content %}

<div class="container-fluid">
    <div class="row mb-3">
        <div class="col-md-6">
            <h4>Designations</h4>
        </div>
        <div class="col-md-6 text-end">
            <a href="{% url 'designation_create' %}" class="btn btn-primary">
                + Add Designation
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Designation</th>
                        <th>Department</th>
                    </tr>
                </thead>
                <tbody>
                    {% for d in designations %}
                    <tr>
                        <td>{{ d.title }}</td>
                        <td>{{ d.department.name }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2" class="text-center">No Designations Found</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
