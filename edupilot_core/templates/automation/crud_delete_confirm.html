{% extends 'automation/base_automation.html' %}
{% block page_title %}Delete {{ label }}{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
    <h3>Confirm Delete</h3>
    <p style="color:#555; margin:14px 0;">Are you sure you want to delete this <b>{{ label }}</b> record?</p>
    <p style="color:#c0392b; font-weight:600;">{{ obj }}</p>
    <form method="post" style="margin-top:18px;">
        {% csrf_token %}
        <button type="submit" class="btn-teal" style="background:#ef4444; color:#fff;">Yes, Delete</button>
        <a href="{% url 'crud-list' model_name=model_name %}" style="margin-left:14px; color:#666; text-decoration:none;">Cancel</a>
    </form>
</div>
{% endblock %}
